<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Donation Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff0050; /* TikTok Pink */
            --secondary-color: #00f2ea; /* TikTok Cyan */
            --bg-color: rgba(0, 0, 0, 0.8);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Kanit', sans-serif;
            background: transparent;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #alert-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .donation-alert {
            position: absolute;
            background: var(--bg-color);
            border-radius: 15px;
            padding: 20px 40px;
            min-width: 300px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--primary-color);
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .donation-alert.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .donation-alert.hide {
            opacity: 0;
            transform: scale(0.8) translateY(-50px);
        }

        .sender-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .amount {
            font-size: 36px;
            font-weight: 700;
            color: #ffcc00;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        .message {
            font-size: 20px;
            font-weight: 300;
            color: var(--text-color);
            font-style: italic;
            word-wrap: break-word;
            max-width: 400px;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Animation for the amount */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .amount-animate {
            display: inline-block;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

    <div id="alert-container">
        <!-- Donation alerts will be injected here -->
    </div>

    <script>
        // --- CONFIGURATION ---
        // ใส่ URL ของ Google Apps Script Web App ที่ได้จากการ Deploy
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwimpYQ7BoKORxjt8mB5hsnUZwXtMNSgs4gaY7g_TkJ5C_pn3eUmCLs4BVN1whaCYU/exec'; 
        const FETCH_INTERVAL = 3000; // ตรวจสอบข้อมูลใหม่ทุก 3 วินาที
        const DISPLAY_DURATION = 7000; // แสดงผลแต่ละ Alert นาน 7 วินาที
        // ---------------------

        let donationQueue = [];
        let isDisplaying = false;

        async function fetchDonations() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();

                if (data.status === 'success' && data.donation) {
                    console.log('New donation received:', data.donation);
                    donationQueue.push(data.donation);
                    processQueue();
                }
            } catch (error) {
                console.error('Error fetching donations:', error);
            }
        }

        function processQueue() {
            if (isDisplaying || donationQueue.length === 0) return;

            isDisplaying = true;
            const donation = donationQueue.shift();
            showAlert(donation);
        }

        function showAlert(donation) {
            const container = document.getElementById('alert-container');
            
            const alertEl = document.createElement('div');
            alertEl.className = 'donation-alert';
            
            alertEl.innerHTML = `
                <div class="sender-name">${escapeHtml(donation.senderName)}</div>
                <div class="amount"><span class="amount-animate">฿${escapeHtml(donation.amount)}</span></div>
                <div class="message">"${escapeHtml(donation.message)}"</div>
            `;

            container.appendChild(alertEl);

            // Trigger show animation
            setTimeout(() => {
                alertEl.classList.add('show');
                // Play sound if needed: new Audio('alert-sound.mp3').play();
            }, 100);

            // Hide and remove after duration
            setTimeout(() => {
                alertEl.classList.add('hide');
                setTimeout(() => {
                    alertEl.remove();
                    isDisplaying = false;
                    processQueue(); // Check for next in queue
                }, 500);
            }, DISPLAY_DURATION);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start polling
        if (WEB_APP_URL !== 'YOUR_WEB_APP_URL_HERE') {
            setInterval(fetchDonations, FETCH_INTERVAL);
            console.log('Donation Alert System Started...');
        } else {
            // Test Mode for User to see the style
            console.warn('Please set your WEB_APP_URL in the script.');
            // Show a test alert
            setTimeout(() => {
                showAlert({
                    senderName: 'ตัวอย่างผู้ส่ง',
                    amount: '100.00',
                    message: 'ขอบคุณสำหรับความรู้ดีๆ ครับ!'
                });
            }, 1000);
        }
    </script>
</body>
</html>
